services:
  - name: tos-backend
    type: web
    env: docker
    rootDir: backend
    dockerfilePath: ./backend/Dockerfile
    region: oregon
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: CEREBRAS_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: "production"
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        value: "https://tos-frontend.onrender.com"

  - name: tos-frontend
    type: web
    env: docker
    rootDir: frontend
    dockerfilePath: ./frontend/Dockerfile
    region: oregon
    plan: free
    envVars:
      - key: VITE_API_URL
        sync: false